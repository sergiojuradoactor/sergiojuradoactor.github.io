  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --text-primary: #111110; --text-secondary: #6b6b67; --text-tertiary: #9b9b97; --bg-primary: #ffffff; --bg-secondary: #f5f4f0; --border: rgba(0,0,0,0.12); }
    body { font-family: 'Jost', sans-serif; font-weight: 300; color: var(--text-primary); background: var(--bg-primary); -webkit-font-smoothing: antialiased; }
    .site { max-width: 960px; margin: 0 auto; padding: 0 3rem; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 2.5rem 0 2rem; border-bottom: 0.5px solid var(--border); margin-bottom: 4rem; position: sticky; top: 0; background: var(--bg-primary); z-index: 10; }
    .nav-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; letter-spacing: 0.02em; text-decoration: none; color: var(--text-primary); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 12px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
    .page-title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 400; margin-bottom: 0.5rem; }
    .page-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 3rem; }
    .video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 2px; overflow: hidden; margin-bottom: 6rem; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    footer { padding: 2rem 0; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--text-tertiary); }
  </style>
</head>
<body>
  <div class="site">
    <nav>
      <a href="index.html" class="nav-name">Sergio Jurado</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>

    </div>
    <footer>
      <span>Sergio Jurado · Actor</span>
      <span>Madrid, 2026</span>
    </footer>
  </div>
</body>
